# this is a github action workflow file that defines my pipeline for my project
name: java-aws-3tier CI/CD Pipeline # this is the name of the workflow

on: # this defines the event triggers for the workflow. it will be triggered on push to the main branch
  push:
    branches: [ main ]

jobs: # this defines the jobs that will run as part of the workflow. jobs run in parallel by default
  build-and-deploy: # this is the name of the job
    runs-on: ubuntu-latest # this defines the type of runner (virtual machine) to be used
    permissions: # this defines the permissions for the job
      contents: read # this gives the job read access to the repository contents
      packages: write # this gives the job write access to the packages in the repository
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps: # this defines the steps in the job
      - name: checkout code
        uses: actions/checkout@v4 # this step checks out the repository so the pipeline can access its contents

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # UPGRADED: installs Java 17 and configures Maven caching on the runner
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # cache Maven dependencies to speed up the build

      - name: Build with Maven
        run: mvn clean package -DskipTests # this step runs the maven command to create a war file in the target directory

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ] || [ -z "$SONAR_ORGANIZATION" ]; then
            echo "Skipping SonarQube scan because required secrets are missing."
            exit 0
          fi
          mvn sonar:sonar \
            -Dsonar.projectKey=spas_project \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN"
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4 # UPGRADED: uploads the .war file so it can be used in the deployment step
        with:
          name: java-war
          path: target/*.war

      - name: deploy to tomcat
        uses: appleboy/scp-action@v0.1.7 # UPGRADED: uses SCP to securely move the file through the Bastion bridge
        with:
          # 1. Connection to the Bastion (The Bridge/Jump Server) 
          proxy_host: ${{ secrets.BASTION_IP }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          
          # 2. Connection to the Tomcat (The Private Destination)
          host: ${{ secrets.TOMCAT_PRIVATE_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          
          # 3. The Payload (The actual file transfer)
          source: "target/*.war"
          target: "/opt/tomcat/webapps/"
          strip_components: 1 # this removes the 'target/' folder prefix so the file lands directly in webapps